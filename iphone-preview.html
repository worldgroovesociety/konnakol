<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Konnakol — iPhone preview</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 18%, #2b2b31, #131315);
    display:flex;flex-direction:column;align-items:center;gap:16px;padding:30px 16px;
    font-family:-apple-system,'Segoe UI',sans-serif;color:#ececed}
  h1{font-size:15px;font-weight:600;letter-spacing:.3px;opacity:.85;margin:0}
  .phone{position:relative;width:414px;height:868px;background:#0a0a0b;border-radius:56px;padding:12px;
    box-shadow:0 40px 90px rgba(0,0,0,.6), inset 0 0 0 2px #2c2c30}
  .screen{position:relative;width:390px;height:844px;border-radius:44px;overflow:hidden;background:#fff}
  .island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:118px;height:32px;background:#000;border-radius:20px;z-index:10}
  iframe{width:390px;height:844px;border:0;display:block}
  .hint{font-size:13px;opacity:.6;max-width:380px;text-align:center;line-height:1.4}
</style>
</head>
<body>
  <h1>worldgroovesociety.com/konnakol &middot; iPhone preview</h1>
  <div class="phone">
    <div class="screen">
      <div class="island"></div>
      <iframe src="https://worldgroovesociety.com/konnakol/" title="Konnakol page on iPhone"></iframe>
    </div>
  </div>
  <div class="hint">Rendered at a true 390px iPhone width. Scroll inside the phone to see the whole page.</div>
</body>
</html>
